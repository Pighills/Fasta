<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FASTA — Fasting Tracker</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c8a84e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FASTA"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',system-ui,sans-serif;background:#0a0a0a;color:#f5f5f0;min-height:100vh;}
button{cursor:pointer;border:none;background:none;font-family:inherit;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popUp{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.fade{animation:fadeIn .25s ease forwards;}
.phase-row:hover{background:rgba(200,168,78,0.04)!important;}
.nav-btn:hover{background:rgba(200,168,78,0.06)!important;}

/* Layout */
#app{display:flex;min-height:100vh;}
#sidebar{width:155px;background:#0e0e0e;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;padding:16px 10px;position:sticky;top:0;height:100vh;flex-shrink:0;gap:4px;}
#main{flex:1;overflow-y:auto;}
#content{max-width:520px;margin:0 auto;padding:26px 22px 60px;}

/* Sidebar */
.sidebar-logo{display:flex;align-items:center;gap:7px;margin-bottom:12px;padding-left:4px;}
.sidebar-logo span:last-child{font-size:15px;font-weight:700;color:#c8a84e;letter-spacing:-.3px;}
.nav-btn{width:100%;padding:11px 12px;border-radius:10px;display:flex;align-items:center;gap:9px;transition:all .15s;text-align:left;}
.nav-btn.active{background:rgba(200,168,78,0.12);color:#c8a84e;border:1px solid rgba(200,168,78,0.22);}
.nav-btn.inactive{color:#e8e4dc;border:1px solid #2a2a2a;background:#141414;}
.nav-btn span.icon{font-size:16px;}
.nav-btn span.label{font-size:13px;font-weight:600;}
.sidebar-divider{height:1px;background:#2a2a2a;margin:8px 0;}
.sidebar-eyebrow{font-size:9px;color:#8a8a80;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding-left:2px;}

/* Flip cards */
.flip-wrap{perspective:1000px;cursor:pointer;}
.flip-inner{position:relative;width:100%;transition:transform .5s;transform-style:preserve-3d;}
.flip-wrap.flipped .flip-inner{transform:rotateY(180deg);}
.flip-front,.flip-back{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:10px;padding:12px;}
.flip-back{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotateY(180deg);background:#141414;border:1px solid rgba(200,168,78,0.22);}

/* Widget */
.widget-idle{background:#0a0a0a;border-radius:8px;padding:10px 12px;border:1px solid #2a2a2a;text-align:center;}
.widget-active{background:#0a0a0a;border-radius:8px;padding:10px 12px;border:1px solid rgba(200,168,78,0.22);}
.widget-status{font-size:9px;color:#c8a84e;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.widget-timer{font-size:18px;font-weight:800;color:#f5f5f0;font-family:monospace;margin-bottom:3px;}
.widget-phase{display:flex;align-items:center;gap:5px;margin-bottom:6px;}
.widget-phase-dot{width:5px;height:5px;border-radius:50%;}
.widget-phase-label{font-size:10px;color:#b5b5aa;}
.widget-bar{height:2px;border-radius:2px;background:#2a2a2a;overflow:hidden;margin-bottom:6px;}
.widget-bar-fill{height:100%;border-radius:2px;background:#c8a84e;transition:width .9s ease;}
.widget-meal-btn{width:100%;padding:5px;border-radius:6px;font-size:10px;font-weight:600;background:#1a1a1a;color:#8a8a80;border:1px solid #2a2a2a;}

/* Cards */
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:16px;}
.eyebrow{font-size:10px;color:#8a8a80;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}

/* Presets */
.preset-pill{padding:6px 13px;border-radius:20px;font-size:13px;font-weight:600;transition:all .15s;}
.preset-pill.active{background:rgba(200,168,78,0.12);color:#c8a84e;border:1px solid rgba(200,168,78,0.22);}
.preset-pill.inactive{background:#141414;color:#8a8a80;border:1px solid #2a2a2a;}
.preset-pill.dim{opacity:.35;}

/* Info card */
.info-card{margin-top:12px;padding:12px;background:#0a0a0a;border-radius:8px;border-left:2px solid #c8a84e;}
.info-title{font-size:13px;font-weight:700;color:#f5f5f0;}
.info-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(200,168,78,0.12);color:#c8a84e;border:1px solid rgba(200,168,78,0.22);font-weight:700;}
.info-text{font-size:12px;color:#b5b5aa;line-height:1.6;margin:8px 0;}
.benefit-chip{font-size:10px;padding:2px 9px;border-radius:20px;background:#1a1a1a;color:#8a8a80;border:1px solid #2a2a2a;}

/* Ring */
.ring-wrap{position:relative;width:200px;height:200px;margin-bottom:14px;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.ring-time{font-size:28px;font-weight:800;color:#f5f5f0;font-family:monospace;letter-spacing:2px;}
.ring-goal{font-size:36px;font-weight:800;color:#c8a84e;}
.ring-sub{font-size:12px;color:#8a8a80;}
.ring-phase{font-size:11px;font-weight:600;}
.ring-next{font-size:10px;color:#8a8a80;}

/* Buttons */
.btn-gold{padding:14px;border-radius:10px;font-size:14px;font-weight:700;background:#c8a84e;color:#0a0a0a;border:none;box-shadow:0 4px 18px rgba(200,168,78,0.25);}
.btn-end{padding:14px;border-radius:10px;font-size:14px;font-weight:700;background:#1a1a1a;color:#8a8a80;border:1px solid #2a2a2a;}
.btn-meal{padding:14px;border-radius:10px;font-size:14px;background:#1a1a1a;color:#8a8a80;border:1px solid #2a2a2a;}

/* Phase timeline */
.phase-spine{position:absolute;left:7px;top:8px;bottom:8px;width:1px;background:#2a2a2a;}
.phase-dot{position:absolute;left:2px;width:10px;height:10px;border-radius:50%;z-index:1;transition:all .6s;}
.phase-label{font-size:12px;font-weight:600;transition:color .6s;}
.phase-tag{font-size:9px;padding:1px 6px;border-radius:20px;font-weight:700;}
.phase-bar{height:2px;border-radius:2px;background:#2a2a2a;overflow:hidden;}
.phase-bar-fill{height:100%;border-radius:2px;transition:width .9s ease;}
.phase-detail{padding:9px 10px 10px 32px;margin-bottom:3px;background:#0a0a0a;border-radius:7px;}

/* Pause banner */
.pause-banner{width:100%;background:rgba(200,168,78,0.08);border:1px solid rgba(200,168,78,0.22);border-radius:8px;padding:9px 12px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}

/* Learn cards */
.learn-card{background:#1a1a1a;border-radius:10px;padding:12px;cursor:pointer;display:flex;flex-direction:column;gap:7px;min-height:120px;transition:transform .15s,border-color .15s;}
.learn-card:hover{transform:translateY(-2px);}
.learn-icon{width:30px;height:30px;border-radius:7px;background:rgba(200,168,78,0.12);border:1px solid rgba(200,168,78,0.22);display:flex;align-items:center;justify-content:center;font-size:14px;}
.learn-title{font-size:11px;font-weight:700;color:#f5f5f0;line-height:1.4;}
.learn-body{font-size:10px;color:#8a8a80;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.learn-more{font-size:10px;color:#c8a84e;font-weight:600;}
.cat-divider{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.cat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;}
.cat-line{flex:1;height:1px;}
.warn-banner{background:rgba(127,29,29,0.25);border:1px solid rgba(239,68,68,0.2);border-radius:7px;padding:9px 12px;margin-bottom:10px;font-size:11px;color:#fca5a5;line-height:1.6;}

/* History */
.hist-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.hist-card:hover{border-color:rgba(200,168,78,0.22);}
.hist-bar{height:2px;border-radius:2px;background:#2a2a2a;overflow:hidden;margin-bottom:7px;}

/* Modal */
.modal-backdrop{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
.modal-box{background:#1a1a1a;border-radius:16px;max-width:400px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,0.7);border:1px solid rgba(200,168,78,0.22);animation:popUp .2s ease;}
.modal-header{padding:18px 18px 14px;border-bottom:1px solid #2a2a2a;}
.modal-body{padding:14px 18px;max-height:60vh;overflow-y:auto;}
.modal-close{color:#8a8a80;font-size:20px;cursor:pointer;line-height:1;}

/* Stat cards */
.stat-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:12px 10px;text-align:center;}
.stat-val{font-size:20px;font-weight:800;color:#c8a84e;}
.stat-label{font-size:10px;color:#8a8a80;margin-top:2px;}

/* Benefit box */
.benefit-box{border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.benefit-effect{display:flex;gap:5px;font-size:12px;color:#b5b5aa;margin-bottom:2px;}
.not-reached{display:flex;gap:8px;align-items:center;padding:7px 10px;background:#0a0a0a;border-radius:8px;margin-bottom:5px;border:1px solid #2a2a2a;opacity:.45;}

/* Meal modal */
.meal-item{display:flex;gap:8px;padding:7px 10px;background:#0a0a0a;border-radius:8px;margin-bottom:4px;border:1px solid #2a2a2a;}
</style>
</head>
<body>

// ── STATE ──
let state = {
  fasting: false, startTime: null, goalHours: null, rolling: true,
  meals: [], history: [], view: 'timer', showInfo: false,
  expandedPhase: null, learnFilter: 'Alla', now: Date.now(), showVariants: false,
  mealSelIdx: 0, mealPauseH: 2, customDesc: '', customKcal: '',
};

// Load from localStorage
try {
  const s = localStorage.getItem('fs4');
  if (s) { const p = JSON.parse(s); if (p.fasting && p.startTime) { state.fasting=p.fasting; state.startTime=p.startTime; state.goalHours=p.goalHours??null; state.rolling=p.rolling??true; state.meals=p.meals||[]; } else { state.goalHours=p.goalHours??null; state.rolling=p.rolling??true; } }
} catch(e) {}
try { const h = localStorage.getItem('fh2'); if (h) state.history = JSON.parse(h); } catch(e) {}

// ── HELPERS ──
function fmt(ms) {
  if (ms < 0) ms = 0;
  const t = Math.floor(ms / 1000);
  return { h: String(Math.floor(t/3600)).padStart(2,'0'), m: String(Math.floor((t%3600)/60)).padStart(2,'0'), s: String(t%60).padStart(2,'0') };
}
function fmtT(d) { return new Date(d).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}); }
function fmtD(d) { return new Date(d).toLocaleDateString('sv-SE',{day:'numeric',month:'short'}); }
function getPhase(h) { let c=PH[0]; for(const p of PH){if(h>=p.h)c=p;else break;} return c; }
function getNext(h) { for(const p of PH){if(h<p.h)return p;} return null; }
function getBenefits(h) { return BENEFITS.filter(b=>h>=b.h); }
function save() { try { localStorage.setItem('fs4', JSON.stringify({fasting:state.fasting,startTime:state.startTime,goalHours:state.goalHours,rolling:state.rolling,meals:state.meals})); } catch(e){} }
function saveH() { try { localStorage.setItem('fh2', JSON.stringify(state.history.slice(-50))); } catch(e){} }

function calcElapsed() {
  if (!state.fasting || !state.startTime) return 0;
  const raw = state.now - state.startTime;
  const paused = state.meals.reduce((a,m) => {
    const pe = m.time + m.pauseHours*3600000;
    if (state.now < m.time) return a;
    return a + Math.min(state.now, pe) - m.time;
  }, 0);
  return Math.max(0, raw - paused);
}
function getActivePause() { return state.meals.find(m => state.now >= m.time && state.now < m.time + m.pauseHours*3600000); }

// ── ACTIONS ──
function startFast(gh, rolling) {
  const t = Date.now();
  state.fasting=true; state.startTime=t; state.now=t; state.meals=[];
  state.goalHours=gh; state.rolling=rolling;
  save(); render();
  startTicker();
}
function endFast() {
  const elapsed = calcElapsed();
  const entry = {start:state.startTime,end:Date.now(),duration:elapsed,goal:state.rolling?null:state.goalHours,reachedGoal:!state.rolling&&state.goalHours&&elapsed/3600000>=state.goalHours,rolling:state.rolling,meals:state.meals};
  state.history.push(entry); saveH();
  state.fasting=false; state.startTime=null; state.meals=[];
  save(); stopTicker(); render();
}
function addMeal(meal) { state.meals.push(meal); save(); render(); }
function setView(v) { state.view=v; render(); }

// ── TICKER ──
let ticker = null;
function startTicker() { if (!ticker) ticker = setInterval(() => { state.now=Date.now(); renderSidebar(); if(state.view==='timer') renderTimer(); }, 1000); }
function stopTicker() { clearInterval(ticker); ticker=null; }
if (state.fasting) startTicker();

// ── MODALS ──
function openModal(html) {
  const el = document.createElement('div');
  el.className = 'modal-backdrop';
  el.innerHTML = html;
  el.addEventListener('click', e => { if (e.target === el) el.remove(); });
  document.addEventListener('keydown', function esc(e) { if(e.key==='Escape'){el.remove();document.removeEventListener('keydown',esc);} });
  document.body.appendChild(el);
  return el;
}

// ── RENDER ──
function renderSidebar() {
  const elapsed = calcElapsed();
  const elh = elapsed/3600000;
  const phase = getPhase(elh);
  const activePause = getActivePause();
  const goalMs = state.rolling||!state.goalHours?null:state.goalHours*3600000;
  const prog = goalMs?Math.min(elapsed/goalMs,1):0;
  const T2 = fmt(elapsed);
  const pauseLeft = activePause?(activePause.time+activePause.pauseHours*3600000-state.now):0;
  const w = document.getElementById('sidebar-widget');
  if (!state.fasting) {
    w.innerHTML = `<div class="widget-idle"><div style="font-size:10px;color:#8a8a80;font-weight:600;margin-bottom:3px">Ingen aktiv fasta</div><div style="font-size:11px;color:#8a8a80">Starta i Timer</div></div>`;
  } else {
    w.innerHTML = `<div class="widget-active">
      <div class="widget-status">${activePause?'⏸ Paus':'● Aktiv'}</div>
      ${activePause
        ?`<div style="font-size:11px;font-weight:700;color:#f5f5f0;margin-bottom:2px">${activePause.desc}</div><div style="font-size:10px;color:#8a8a80;margin-bottom:6px">Om ${fmt(pauseLeft).h}:${fmt(pauseLeft).m}:${fmt(pauseLeft).s}</div>`
        :`<div class="widget-timer">${T2.h}:${T2.m}:${T2.s}</div>
         <div class="widget-phase"><div class="widget-phase-dot" style="background:${phase.c}"></div><span class="widget-phase-label">${phase.l}</span></div>`}
      ${!state.rolling&&!activePause&&goalMs?`<div class="widget-bar"><div class="widget-bar-fill" style="width:${prog*100}%"></div></div>`:''}
      ${!activePause?`<button class="widget-meal-btn" onclick="openMealModal()">🍳 Logga måltid</button>`:''}
    </div>`;
  }
  // nav active states
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.className = 'nav-btn ' + (b.dataset.view===state.view?'active':'inactive');
  });
}

function renderTimer() {

  const phase = getPhase(elh);

        <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="${rc}" stop-opacity=".6"/><stop offset="100%" stop-color="${rc}"/></linearGradient></defs>
        <circle cx="100" cy="100" r="${R}" fill="none" stroke="#2a2a2a" stroke-width="9"/>
        ${!state.rolling?`<circle cx="100" cy="100" r="${R}" fill="none" stroke="url(#rg)" stroke-width="9" stroke-dasharray="${C}" stroke-dashoffset="${strokeOffset}" stroke-linecap="round" style="transition:stroke-dashoffset .9s ease"/>`:
        state.fasting?`<circle cx="100" cy="100" r="${R}" fill="none" stroke="${rc}" stroke-width="9" stroke-dasharray="16 9" stroke-linecap="round"/>`:''}
      </svg>
      <div class="ring-center">
        ${state.fasting
          ?`<span class="ring-time">${T2.h}:${T2.m}:${T2.s}</span>
            ${state.meals.length?`<span style="font-size:9px;color:#8a8a80">netto fastetid</span>`:''}
            <span class="ring-phase" style="color:${activePause?'#c8a84e':phase.c}">${activePause?'⏸ Paus':phase.i+' '+phase.l}</span>
            ${!state.rolling&&reached?`<span style="font-size:11px;color:#c8a84e;font-weight:700">🎯 Mål nått!</span>`:!state.rolling&&next&&!activePause?`<span class="ring-next">nästa om ${fmt(tnext).h}:${fmt(tnext).m}:${fmt(tnext).s}</span>`:''}
            ${state.rolling?`<span class="ring-next">Löpande ∞</span>`:''}`
          :`<span class="ring-goal">${state.rolling?'∞':state.goalHours+'h'}</span>
            <span class="ring-sub">${state.rolling?'löpande fasta':'mål'}</span>`}
      </div>
    </div>
    ${state.fasting&&state.meals.length?`<div style="width:100%;margin-bottom:12px">
      <div class="eyebrow">Måltider</div>
      ${state.meals.map(m=>`<div class="meal-item"><span>🍳</span><div><div style="font-size:11px;font-weight:600;color:#f5f5f0">${m.desc}</div><div style="font-size:10px;color:#8a8a80">${fmtT(m.time)} · ${m.kcal} kcal · ${m.pauseHours}h</div></div></div>`).join('')}
    </div>`:''}
    <div style="display:flex;gap:8px;width:100%">
      <button class="${state.fasting?'btn-end':'btn-gold'}" style="flex:1" onclick="${state.fasting?'endFast()':'startFast(state.rolling?null:state.goalHours,state.rolling)'}">${state.fasting?'⏹ Avsluta fasta':'▶ Starta fasta'}</button>
      ${state.fasting&&!activePause?`<button class="btn-meal" onclick="openMealModal()">🍳</button>`:''}
    </div>
    ${state.fasting&&state.startTime?`<div style="font-size:11px;color:#8a8a80;margin-top:7px">Startade ${fmtT(state.startTime)} · ${fmtD(state.startTime)}</div>`:''}
  </div>`;

  // Phase timeline
  html += `<div class="card">
    <div class="eyebrow">Kroppens faser</div>
    <div style="position:relative;padding-left:20px">
      <div class="phase-spine"></div>
      ${PH.map((p,i)=>{
        const last=i===PH.length-1;
        const hit=state.fasting&&elh>=p.h;
        const act=state.fasting&&elh>=p.h&&(last||elh<PH[i+1].h);
        const ex=state.expandedPhase===i;
        const pe=last?Math.max(state.goalHours||72,p.h):PH[i+1].h;
        const sl=pe-p.h||1;
        let sp=0; if(state.fasting){if(elh>=pe)sp=1;else if(elh>p.h)sp=(elh-p.h)/sl;}
        return `<div>
          <div class="phase-row" onclick="state.expandedPhase=${ex?'null':i};renderTimer()" style="display:flex;gap:11px;padding:8px 7px;border-radius:7px;cursor:pointer;background:${act?p.c+'0d':'transparent'};margin-left:-3px;transition:background .2s">
            <div class="phase-dot" style="margin-top:6px;background:${hit?p.c:'#2a2a2a'};box-shadow:${act?`0 0 7px ${p.c}80`:'none'}"></div>
            <span style="font-size:16px;opacity:${hit?1:.2};margin-top:1px">${p.i}</span>
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
                <span class="phase-label" style="color:${hit?'#f5f5f0':'#8a8a80'}">${p.l}</span>
                ${act?`<span class="phase-tag" style="background:${p.c}20;color:${p.c}">NU</span>`:''}
                <span style="font-size:10px;color:#8a8a80;margin-left:auto">${p.h===0?'0h':p.h+'h'}</span>
              </div>
              ${state.fasting?`<div class="phase-bar"><div class="phase-bar-fill" style="width:${sp*100}%;background:${hit?p.c:'#2a2a2a'}"></div></div>`:''}
            </div>
            <span style="font-size:9px;color:#8a8a80;margin-top:2px">${ex?'▲':'▼'}</span>
          </div>
          ${ex?`<div class="phase-detail fade" style="border-left:1.5px solid ${p.c}50">
            <p style="font-size:12px;color:#b5b5aa;line-height:1.6;margin-bottom:4px">${p.d}</p>
            <p style="font-size:11px;color:#8a8a80;line-height:1.7">${p.x}</p>
          </div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;

  document.getElementById('content').innerHTML = html;
}

function renderLearn() {
  const cats = ['Alla', ...[...new Set(LC.map(c=>c.cat))]];
  const showing = state.learnFilter==='Alla' ? [...new Set(LC.map(c=>c.cat))] : [state.learnFilter];
  let html = `<div style="font-size:21px;font-weight:800;color:#f5f5f0;margin-bottom:4px;letter-spacing:-.5px">Lär dig fasta</div>
    <div style="font-size:13px;color:#8a8a80;margin-bottom:18px">Tryck på ett kort för mer information</div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px">
      ${cats.map(c=>{const w=c==='Vanliga farhågor';const act=state.learnFilter===c;return`<button onclick="state.learnFilter='${c}';renderLearn()" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:${act?(w?'rgba(127,29,29,0.3)':'rgba(200,168,78,0.12)'):'#1a1a1a'};color:${act?(w?'#fca5a5':'#c8a84e'):(w?'#fca5a5':'#8a8a80')};border:1px solid ${act?(w?'rgba(239,68,68,0.3)':'rgba(200,168,78,0.22)'):(w?'rgba(239,68,68,0.2)':'#2a2a2a')}">${w?'⚠️ '+c:c}</button>`;}).join('')}
    </div>`;
  showing.forEach(cat=>{
    const cards=LC.filter(c=>c.cat===cat);
    const w=cat==='Vanliga farhågor';
    html+=`<div style="margin-bottom:26px">
      <div class="cat-divider">
        ${w?'<span style="font-size:11px">⚠️</span>':''}
        <span class="cat-label" style="color:${w?'#fca5a5':'#8a8a80'}">${cat}</span>
        <div class="cat-line" style="background:${w?'rgba(239,68,68,0.2)':'#2a2a2a'}"></div>
      </div>
      ${w?`<div class="warn-banner">Ersätter inte medicinsk rådgivning. Kontakta läkare vid befintlig hälsokondition.</div>`:''}
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px">
        ${cards.map(card=>`<div class="learn-card" style="border:1px solid ${w?'rgba(239,68,68,0.2)':'#2a2a2a'}" onclick="openCardModal(LC[${card.id-1}])"
          onmouseenter="this.style.borderColor='${w?'rgba(239,68,68,0.4)':'rgba(200,168,78,0.22)'}'"
          onmouseleave="this.style.borderColor='${w?'rgba(239,68,68,0.2)':'#2a2a2a'}'">
          <div class="learn-icon">${card.i}</div>
          <div class="learn-title">${card.f}</div>
          <div class="learn-body">${card.fb}</div>
          <div class="learn-more">Läs mer →</div>
        </div>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('content').innerHTML = html;
}

function renderHistory() {
  const h = state.history;
  let html = `<div style="font-size:21px;font-weight:800;color:#f5f5f0;margin-bottom:4px;letter-spacing:-.5px">Historik</div>
    <div style="font-size:13px;color:#8a8a80;margin-bottom:18px">Dina genomförda fastor</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:18px">
      ${[{l:'Antal',v:h.length||'0'},{l:'Längsta',v:h.length?Math.round(Math.max(...h.map(e=>e.duration))/3600000*10)/10+'h':'—'},{l:'Mål nått',v:h.length?Math.round(h.filter(e=>e.reachedGoal).length/h.length*100)+'%':'—'}].map(s=>`<div class="stat-card"><div class="stat-val">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join('')}
    </div>`;
  if (!h.length) {
    html += `<div style="text-align:center;padding:50px 20px;color:#8a8a80"><div style="font-size:32px;margin-bottom:10px">📋</div><p>Ingen historik ännu</p></div>`;
  } else {
    [...h].reverse().forEach((entry,i)=>{
      const dh=entry.duration/3600000;
      const ph=getPhase(dh);
      const pct=entry.goal?Math.min(dh/entry.goal,1):1;
      const bens=getBenefits(dh);
      const top=bens[bens.length-1];
      html+=`<div class="hist-card fade" onclick="openHistoryModal(state.history[${h.length-1-i}])" style="animation-delay:${i*0.04}s">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
          <div style="display:flex;align-items:center;gap:7px">
            <span style="font-size:15px">${top?top.i:'⏱'}</span>
            <span style="font-size:13px;font-weight:700;color:#f5f5f0">${entry.rolling?'∞ ':''}${Math.round(dh*10)/10}h fasta</span>
            ${entry.reachedGoal?`<span style="font-size:9px;padding:2px 6px;border-radius:20px;background:rgba(200,168,78,0.12);color:#c8a84e;border:1px solid rgba(200,168,78,0.22);font-weight:700">✓ MÅL</span>`:''}
            ${(entry.meals||[]).length?`<span style="font-size:9px;padding:2px 6px;border-radius:20px;background:#1a1a1a;color:#8a8a80;border:1px solid #2a2a2a;font-weight:700">🍳 ${entry.meals.length}</span>`:''}
          </div>
          <span style="font-size:11px;color:#8a8a80">${fmtD(entry.start)}</span>
        </div>
        <div class="hist-bar"><div style="height:100%;border-radius:2px;width:${pct*100}%;background:${entry.reachedGoal?'#c8a84e':ph.c};transition:width 1s ease"></div></div>
        <div style="display:flex;justify-content:space-between">
          <div style="font-size:11px;color:#8a8a80">${ph.i} ${ph.l} uppnådd</div>
          <div style="font-size:11px;color:#c8a84e;font-weight:600">Detaljer →</div>
        </div>
      </div>`;
    });
    html+=`<button onclick="if(confirm('Rensa all historik?')){state.history=[];localStorage.removeItem('fh2');renderHistory();}" style="width:100%;margin-top:6px;padding:11px;border-radius:8px;font-size:12px;color:#8a8a80;border:1px solid #2a2a2a;background:transparent;cursor:pointer">Rensa historik</button>`;
  }
  document.getElementById('content').innerHTML = html;
}

function render() {
  renderSidebar();
  if (state.view==='timer') renderTimer();
  else if (state.view==='lära') renderLearn();
  else if (state.view==='historik') renderHistory();
}

render();

// PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
