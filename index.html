const ACTIVITY_LABELS = {
  stillasittande:"Stillasittande (kontorsarbete, lite rörelse)",
  lätt:"Lätt aktiv (promenader, lätt träning 1–2 ggr/v)",
  aktiv:"Regelbundet aktiv (träning 3–5 ggr/v)",
  atlet:"Atlet (intensiv träning 6–7 ggr/v)"
};

// ── STATE ──
let state = {
  fasting:false,startTime:null,goalHours:null,rolling:true,
  meals:[],workouts:[],history:[],view:'timer',showVariants:false,
  selectedVariant:null,expandedPhase:null,learnFilter:'Alla',now:Date.now(),
};
let profile = {gender:null,age:null,height:null,weight:null,activity:null};

try{const s=localStorage.getItem('fs4');if(s){const p=JSON.parse(s);if(p.fasting&&p.startTime){state.fasting=p.fasting;state.startTime=p.startTime;state.goalHours=p.goalHours??null;state.rolling=p.rolling??true;state.meals=p.meals||[];state.workouts=p.workouts||[];}else{state.goalHours=p.goalHours??null;state.rolling=p.rolling??true;}}}catch(e){}
try{const h=localStorage.getItem('fh2');if(h)state.history=JSON.parse(h);}catch(e){}
try{const p=localStorage.getItem('fasta-profile');if(p)profile=JSON.parse(p);}catch(e){}

// ── HELPERS ──
function fmt(ms){if(ms<0)ms=0;const t=Math.floor(ms/1000);return{h:String(Math.floor(t/3600)).padStart(2,'0'),m:String(Math.floor((t%3600)/60)).padStart(2,'0'),s:String(t%60).padStart(2,'0')};}
function fmtHuman(ms){if(ms<0)ms=0;const h=Math.floor(ms/3600000);const m=Math.floor((ms%3600000)/60000);return h>0?`${h}h ${m}m`:`${m}m`;}
function fmtT(d){return new Date(d).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});}
function fmtD(d){return new Date(d).toLocaleDateString('sv-SE',{day:'numeric',month:'short'});}
function getPhase(h){let c=PH[0];for(const p of PH){if(h>=p.h)c=p;else break;}return c;}
function getNext(h){for(const p of PH){if(h<p.h)return p;}return null;}
function getBenefits(h){return BENEFITS.filter(b=>h>=b.h);}
function profileComplete(){return profile.gender&&profile.age&&profile.height&&profile.weight&&profile.activity;}
function save(){try{localStorage.setItem('fs4',JSON.stringify({fasting:state.fasting,startTime:state.startTime,goalHours:state.goalHours,rolling:state.rolling,meals:state.meals,workouts:state.workouts}));}catch(e){}}
function saveH(){try{localStorage.setItem('fh2',JSON.stringify(state.history.slice(-50)));}catch(e){}}
function saveProfile(){try{localStorage.setItem('fasta-profile',JSON.stringify(profile));}catch(e){}}

function calcElapsed(){
  if(!state.fasting||!state.startTime)return 0;
  const raw=state.now-state.startTime;
  const paused=state.meals.reduce((a,m)=>{const pe=m.time+m.pauseHours*3600000;if(state.now<m.time)return a;return a+Math.min(state.now,pe)-m.time;},0);
  return Math.max(0,raw-paused);
}

function calcMetabolicMultiplier(prof){
  if(!prof||!prof.weight||!prof.height||!prof.age||!prof.gender||!prof.activity)return 1;
  const {weight,height,age,gender,activity}=prof;
  let bmr;
  if(gender==='man')bmr=10*weight+6.25*height-5*age+5;
  else if(gender==='kvinna')bmr=10*weight+6.25*height-5*age-161;
  else bmr=10*weight+6.25*height-5*age-78;
  const actMult={stillasittande:1.2,lätt:1.375,aktiv:1.55,atlet:1.725};
  const tdee=bmr*(actMult[activity]||1.375);
  let lbm;
  if(gender==='man')lbm=0.407*weight+0.267*height-19.2;
  else lbm=0.252*weight+0.473*height-48.3;
  lbm=Math.max(lbm,weight*0.45);
  const glycPerKg={stillasittande:14,lätt:12,aktiv:9,atlet:6};
  const totalGlycogen=lbm*(glycPerKg[activity]||10)+80;
  const refBMR=10*78+6.25*178-5*35+5;
  const refTDEE=refBMR*1.375;
  const refLBM=0.407*78+0.267*178-19.2;
  const refGlycogen=refLBM*12+80;
  const mult=(tdee/refTDEE)/(totalGlycogen/refGlycogen);
  return Math.min(1.9,Math.max(0.55,mult));
}

function calcWorkoutBonusMs(){
  return state.workouts.reduce((acc,wo)=>{
    const kcal=wo.kcal||0;
    const maxHr=wo.maxHr>0?wo.maxHr:(220-(profile.age||35));
    const hrPct=wo.avgHr>0?Math.min(wo.avgHr/maxHr,1):0.65;
    const glycFrac=hrPct<0.6?0.3:hrPct<0.75?0.5:hrPct<0.85?0.7:0.85;
    const glycGrams=(kcal*glycFrac)/4;
    const bonusHours=glycGrams/10;
    return acc+bonusHours*3600000;
  },0);
}

function calcMetabolicElapsed(){
  const elapsed=calcElapsed();
  const mult=calcMetabolicMultiplier(profile);
  const bonus=calcWorkoutBonusMs();
  return elapsed*mult+bonus;
}

function getActivePause(){return state.meals.find(m=>state.now>=m.time&&state.now<m.time+m.pauseHours*3600000);}

// ── DRAWER ──
function toggleDrawer(){const d=document.getElementById('drawer'),o=document.getElementById('drawer-overlay'),open=d.classList.toggle('open');open?o.classList.add('open'):o.classList.remove('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');}

// ── ACTIONS ──
function setView(v){state.view=v;render();}
function startFast(gh,rolling){
  const t=Date.now();
  state.fasting=true;state.startTime=t;state.now=t;state.meals=[];state.workouts=[];
  state.goalHours=gh;state.rolling=rolling;state.selectedVariant=null;state.showVariants=false;
  save();render();startTicker();
}
function endFast(){
  const elapsed=calcElapsed();const elh=elapsed/3600000;const ph=getPhase(elh);const T2=fmt(elapsed);
  openModal(`<div class="modal-box" onclick="event.stopPropagation()" style="max-width:340px">
    <div class="modal-header"><div style="font-size:16px;font-weight:700;color:#f5f5f0;margin-bottom:4px">Avsluta fastan?</div>
    <div style="font-size:12px;color:#8a8a80">Du har fastat i ${T2.h}h ${T2.m}m och nått <strong style="color:${ph.c}">${ph.i} ${ph.l}</strong>.</div></div>
    <div class="modal-body" style="padding:16px 18px">
      <div style="background:#141414;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:#8a8a80;line-height:1.6">Är du säker? Fastan registreras i historiken och kan inte återupptas.</div>
      <div style="display:flex;gap:10px">
        <button onclick="this.closest('.modal-backdrop').remove()" style="flex:1;padding:13px;border-radius:10px;font-size:14px;font-weight:600;background:#141414;color:#e8e4dc;border:1px solid #2a2a2a;cursor:pointer">Fortsätt fasta</button>
        <button onclick="this.closest('.modal-backdrop').remove();_doEndFast()" style="flex:1;padding:13px;border-radius:10px;font-size:14px;font-weight:700;background:#1a1a1a;color:#ef4444;border:1px solid rgba(239,68,68,0.3);cursor:pointer">Ja, avsluta</button>
      </div>
    </div>
  </div>`);
}
function _doEndFast(){
  const elapsed=calcElapsed();const metElapsed=calcMetabolicElapsed();
  const prof=profileComplete()?{...profile}:null;
  const entry={start:state.startTime,end:Date.now(),duration:elapsed,metDuration:metElapsed,goal:state.rolling?null:state.goalHours,reachedGoal:!state.rolling&&state.goalHours&&elapsed/3600000>=state.goalHours,rolling:state.rolling,meals:state.meals,workouts:state.workouts,profile:prof};
  state.history.push(entry);saveH();
  state.fasting=false;state.startTime=null;state.meals=[];state.workouts=[];
  save();stopTicker();render();
}
function addMeal(meal){state.meals.push(meal);save();render();}
function addWorkout(wo){state.workouts.push(wo);save();render();}
function deleteEntry(idx){
  const entry=state.history[idx];const dh=entry.duration/3600000;
  openModal(`<div class="modal-box" onclick="event.stopPropagation()" style="max-width:340px">
    <div class="modal-header"><div style="font-size:16px;font-weight:700;color:#f5f5f0;margin-bottom:4px">Radera fasta?</div>
    <div style="font-size:12px;color:#8a8a80">${fmtD(entry.start)} · ${Math.round(dh*10)/10}h fasta</div></div>
    <div class="modal-body" style="padding:16px 18px">
      <div style="background:#141414;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:#8a8a80;line-height:1.6">Denna fasta tas bort permanent och kan inte återställas.</div>
      <div style="display:flex;gap:10px">

// ── TICKER ──
let ticker=null;
function startTicker(){if(!ticker)ticker=setInterval(()=>{state.now=Date.now();renderSidebar();renderMobileStatus();if(state.view==='timer')renderTimer();},1000);}
function stopTicker(){clearInterval(ticker);ticker=null;}
if(state.fasting)startTicker();

// ── WIDGET ──
function widgetHTML(){
  const elapsed=calcElapsed();const elh=elapsed/3600000;
  const mElapsed=calcMetabolicElapsed();
  const phase=getPhase(elh);const activePause=getActivePause();
  const goalMs=state.rolling||!state.goalHours?null:state.goalHours*3600000;
  const prog=goalMs?Math.min(elapsed/goalMs,1):0;
  const T2=fmt(elapsed);const pauseLeft=activePause?(activePause.time+activePause.pauseHours*3600000-state.now):0;
  if(!state.fasting)return`<div style="background:#0a0a0a;border-radius:8px;padding:10px 12px;border:1px solid #2a2a2a;text-align:center"><div style="font-size:10px;color:#8a8a80;font-weight:600;margin-bottom:3px">Ingen aktiv fasta</div><div style="font-size:11px;color:#8a8a80">Starta i Timer</div></div>`;
  return`<div style="background:#0a0a0a;border-radius:8px;padding:10px 12px;border:1px solid rgba(200,168,78,0.22)">
    <div style="font-size:9px;color:#c8a84e;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">${activePause?'⏸ Paus':'● Aktiv fasta'}</div>
    ${activePause
      ?`<div style="font-size:11px;font-weight:700;color:#f5f5f0;margin-bottom:2px">${activePause.desc}</div><div style="font-size:10px;color:#8a8a80;margin-bottom:6px">Om ${fmt(pauseLeft).h}:${fmt(pauseLeft).m}:${fmt(pauseLeft).s}</div>`
      :`<div style="font-size:16px;font-weight:800;color:#f5f5f0;font-family:monospace;margin-bottom:2px">${T2.h}:${T2.m}:${T2.s}</div>
       <div style="display:flex;align-items:center;gap:5px;margin-bottom:${profileComplete()?'3px':'6px'}"><div style="width:5px;height:5px;border-radius:50%;background:${phase.c}"></div><span style="font-size:10px;color:#b5b5aa">${phase.l}</span></div>
       ${profileComplete()?`<div style="font-size:10px;color:#c8a84e;font-weight:600;margin-bottom:6px">⚡ ~${fmtHuman(mElapsed)}</div>`:''}`}
    ${!state.rolling&&!activePause&&goalMs?`<div style="height:2px;border-radius:2px;background:#2a2a2a;overflow:hidden;margin-bottom:6px"><div style="height:100%;background:#c8a84e;width:${prog*100}%;transition:width .9s ease"></div></div>`:''}
    ${!activePause?`<div style="display:flex;gap:5px">
      <button onclick="openMealModal()" style="flex:1;padding:5px;border-radius:6px;font-size:10px;font-weight:600;background:#1a1a1a;color:#8a8a80;border:1px solid #2a2a2a;cursor:pointer">🍳 Måltid</button>
      <button onclick="openWorkoutModal()" style="flex:1;padding:5px;border-radius:6px;font-size:10px;font-weight:600;background:#1a1a1a;color:#8a8a80;border:1px solid #2a2a2a;cursor:pointer">🏋️ Träning</button>
    </div>`:''}
  </div>`;
}
function renderSidebar(){
  const sw=document.getElementById('sidebar-widget'),dw=document.getElementById('drawer-widget');
  if(sw)sw.innerHTML=widgetHTML();if(dw)dw.innerHTML=widgetHTML();
  document.querySelectorAll('.nav-btn[data-view]').forEach(b=>{b.className='nav-btn '+(b.dataset.view===state.view?'active':'inactive');});
}
function renderMobileStatus(){
  const el=document.getElementById('mobile-status-pill');if(!el)return;
  if(!state.fasting){el.textContent='⏱ Ingen fasta';el.className='mobile-status-pill';return;}
  const T2=fmt(calcElapsed());el.textContent=`● ${T2.h}:${T2.m}:${T2.s}`;el.className='mobile-status-pill active-pill';
}

// ── MODALS ──
function openModal(html){
  const el=document.createElement('div');el.className='modal-backdrop';el.innerHTML=html;
  el.addEventListener('click',e=>{if(e.target===el)el.remove();});
  document.addEventListener('keydown',function esc(e){if(e.key==='Escape'){el.remove();document.removeEventListener('keydown',esc);}});
  document.body.appendChild(el);return el;
}
function openCardModal(idx){

    html+=`<div class="card" style="display:flex;flex-direction:column;align-items:center;margin-bottom:14px">
      ${activePause?`<div class="pause-banner"><div><div style="font-size:12px;font-weight:700;color:#c8a84e">⏸ ${activePause.desc}</div><div style="font-size:11px;color:#8a8a80">Återupptas om ${fmt(pauseLeft).h}:${fmt(pauseLeft).m}:${fmt(pauseLeft).s}</div></div><span>🍳</span></div>`:''}
      <div class="ring-wrap">
        <svg width="200" height="200" style="transform:rotate(-90deg)">
          <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="${rc}" stop-opacity=".6"/><stop offset="100%" stop-color="${rc}"/></linearGradient></defs>
          <circle cx="100" cy="100" r="${R}" fill="none" stroke="#2a2a2a" stroke-width="9"/>
          ${!state.rolling?`<circle cx="100" cy="100" r="${R}" fill="none" stroke="url(#rg)" stroke-width="9" stroke-dasharray="${C}" stroke-dashoffset="${strokeOffset}" stroke-linecap="round" style="transition:stroke-dashoffset .9s ease"/>`
          :`<circle cx="100" cy="100" r="${R}" fill="none" stroke="${rc}" stroke-width="9" stroke-dasharray="16 9" stroke-linecap="round"/>`}
        </svg>
        <div class="ring-center">
          <span style="font-size:28px;font-weight:800;color:#f5f5f0;font-family:monospace;letter-spacing:2px">${T2.h}:${T2.m}:${T2.s}</span>
          ${state.meals.length||state.workouts.length?`<span style="font-size:9px;color:#8a8a80">netto fastetid</span>`:''}
          <span style="font-size:11px;font-weight:600;color:${activePause?'#c8a84e':phase.c}">${activePause?'⏸ Paus':phase.i+' '+phase.l}</span>
          ${!state.rolling&&reached?`<span style="font-size:11px;color:#c8a84e;font-weight:700">🎯 Mål nått!</span>`:!state.rolling&&next&&!activePause?`<span style="font-size:10px;color:#8a8a80">nästa om ${fmt(tnext).h}:${fmt(tnext).m}:${fmt(tnext).s}</span>`:''}
          ${state.rolling?`<span style="font-size:10px;color:#8a8a80">Löpande ∞</span>`:''}
        </div>
      </div>
      ${state.meals.length||state.workouts.length?`<div style="width:100%;margin-bottom:12px">
        ${state.meals.length?`<div class="eyebrow">Måltider</div>${state.meals.map(m=>`<div class="log-item"><span>🍳</span><div><div style="font-size:11px;font-weight:600;color:#f5f5f0">${m.desc}</div><div style="font-size:10px;color:#8a8a80">${fmtT(m.time)} · ${m.kcal} kcal · ${m.pauseHours}h paus</div></div></div>`).join('')}`:''}
        ${state.workouts.length?`<div class="eyebrow" style="margin-top:8px">Träningspass</div>${state.workouts.map(wo=>`<div class="log-item"><span>${wo.icon}</span><div><div style="font-size:11px;font-weight:600;color:#f5f5f0">${wo.type} · ${wo.durationMins} min</div><div style="font-size:10px;color:#8a8a80">${fmtT(wo.time)}${wo.kcal?` · ${wo.kcal} kcal`:''}${wo.avgHr?` · ♥ ${wo.avgHr} bpm`:''}</div></div></div>`).join('')}`:''}
      </div>`:''}
      <div style="display:flex;gap:8px;width:100%">
        <button class="btn-end" style="flex:1" onclick="endFast()">⏹ Avsluta fasta</button>
        ${!activePause?`<button class="btn-icon" onclick="openMealModal()" title="Logga måltid">🍳</button>
        <button class="btn-icon" onclick="openWorkoutModal()" title="Logga träning">🏋️</button>`:''}
      </div>
    </div>`;
  }

  // Phase timeline
  html+=`<div class="card"><div class="eyebrow">Kroppens faser${hasProfil&&state.fasting?' (metabol tid)':''}</div>
    <div style="position:relative;padding-left:20px">
      <div style="position:absolute;left:7px;top:8px;bottom:8px;width:1px;background:#2a2a2a"></div>
      ${PH.map((p,i)=>{
        const last=i===PH.length-1,timeToUse=hasProfil&&state.fasting?mElh:elh;
        const hit=state.fasting&&timeToUse>=p.h,act=state.fasting&&timeToUse>=p.h&&(last||timeToUse<PH[i+1].h);
        const ex=state.expandedPhase===i;
        const pe=last?Math.max(state.goalHours||72,p.h):PH[i+1].h,sl=pe-p.h||1;
        let sp=0;if(state.fasting){if(timeToUse>=pe)sp=1;else if(timeToUse>p.h)sp=(timeToUse-p.h)/sl;}
        return`<div>
          <div class="phase-row" onclick="state.expandedPhase=${ex?'null':i};renderTimer()" style="display:flex;gap:11px;padding:8px 7px;border-radius:7px;cursor:pointer;background:${act?p.c+'0d':'transparent'};margin-left:-3px">
            <div class="phase-dot" style="margin-top:6px;background:${hit?p.c:'#2a2a2a'};box-shadow:${act?`0 0 7px ${p.c}80`:'none'}"></div>
            <span style="font-size:16px;opacity:${hit?1:.2};margin-top:1px">${p.i}</span>
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
                <span style="font-size:12px;font-weight:600;color:${hit?'#f5f5f0':'#8a8a80'}">${p.l}</span>
                ${act?`<span style="font-size:9px;padding:1px 6px;border-radius:20px;background:${p.c}20;color:${p.c};font-weight:700">NU</span>`:''}
                <span style="font-size:10px;color:#8a8a80;margin-left:auto">${p.h===0?'0h':p.h+'h'}</span>
              </div>
              ${state.fasting?`<div class="phase-bar"><div class="phase-bar-fill" style="width:${sp*100}%;background:${hit?p.c:'#2a2a2a'}"></div></div>`:''}
            </div>
            <span style="font-size:9px;color:#8a8a80;margin-top:2px">${ex?'▲':'▼'}</span>
          </div>
          ${ex?`<div class="phase-detail fade" style="border-left:1.5px solid ${p.c}50"><p style="font-size:12px;color:#b5b5aa;line-height:1.6;margin-bottom:6px">${p.d}</p><p style="font-size:11px;color:#8a8a80;line-height:1.7">${p.x}</p></div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
  document.getElementById('content').innerHTML=html;
}

// ── RENDER LEARN ──
function renderLearn(){
  const cats=['Alla',...new Set(LC.map(c=>c.cat))];
  const showing=state.learnFilter==='Alla'?[...new Set(LC.map(c=>c.cat))]:[state.learnFilter];
  let html=`<div style="font-size:21px;font-weight:800;color:#f5f5f0;margin-bottom:4px;letter-spacing:-.5px">Lär dig fasta</div>
    <div style="font-size:13px;color:#8a8a80;margin-bottom:18px">Tryck på ett kort för mer information</div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px">
      ${cats.map(c=>{const w=c==='Vanliga farhågor',act=state.learnFilter===c;return`<button onclick="state.learnFilter='${c}';renderLearn()" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:${act?(w?'rgba(127,29,29,0.3)':'rgba(200,168,78,0.12)'):'#1a1a1a'};color:${act?(w?'#fca5a5':'#c8a84e'):(w?'#fca5a5':'#8a8a80')};border:1px solid ${act?(w?'rgba(239,68,68,0.3)':'rgba(200,168,78,0.22)'):(w?'rgba(239,68,68,0.2)':'#2a2a2a')}">${w?'⚠️ '+c:c}</button>`;}).join('')}
    </div>`;
  showing.forEach(cat=>{
    const cards=LC.filter(c=>c.cat===cat),w=cat==='Vanliga farhågor';
    html+=`<div style="margin-bottom:26px">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:10px">
        ${w?'<span style="font-size:11px">⚠️</span>':''}
        <span style="font-size:10px;font-weight:700;color:${w?'#fca5a5':'#8a8a80'};text-transform:uppercase;letter-spacing:1.5px">${cat}</span>
        <div style="flex:1;height:1px;background:${w?'rgba(239,68,68,0.2)':'#2a2a2a'}"></div>
      </div>
      ${w?`<div class="warn-banner">Ersätter inte medicinsk rådgivning. Kontakta läkare vid befintlig hälsokondition.</div>`:''}
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px">
        ${cards.map(card=>`<div class="learn-card" style="border:1px solid ${w?'rgba(239,68,68,0.2)':'#2a2a2a'}" onclick="openCardModal(${card.id-1})"
          onmouseenter="this.style.borderColor='${w?'rgba(239,68,68,0.4)':'rgba(200,168,78,0.22)'}'"
          onmouseleave="this.style.borderColor='${w?'rgba(239,68,68,0.2)':'#2a2a2a'}'">
          <div class="learn-icon-box">${card.i}</div>
          <div style="font-size:11px;font-weight:700;color:#f5f5f0;line-height:1.4;flex:1">${card.f}</div>
          <div style="font-size:10px;color:#8a8a80;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${card.fb}</div>
          <div style="font-size:10px;color:#c8a84e;font-weight:600">Läs mer →</div>
        </div>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('content').innerHTML=html;
}

// ── RENDER HISTORY ──
function renderHistory(){
  const h=state.history;
  let html=`<div style="font-size:21px;font-weight:800;color:#f5f5f0;margin-bottom:4px;letter-spacing:-.5px">Historik</div>
    <div style="font-size:13px;color:#8a8a80;margin-bottom:18px">Dina genomförda fastor</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:18px">
      ${[{l:'Antal',v:h.length||'0'},{l:'Längsta',v:h.length?Math.round(Math.max(...h.map(e=>e.duration))/3600000*10)/10+'h':'—'},{l:'Mål nått',v:h.length?Math.round(h.filter(e=>e.reachedGoal).length/h.length*100)+'%':'—'}].map(s=>`<div class="stat-card"><div class="stat-val">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join('')}
    </div>`;
  if(!h.length){
    html+=`<div style="text-align:center;padding:50px 20px;color:#8a8a80"><div style="font-size:32px;margin-bottom:10px">📋</div><p>Ingen historik ännu</p></div>`;
  } else {
    [...h].reverse().forEach((entry,i)=>{
      const realIdx=h.length-1-i,dh=entry.duration/3600000;
      const ph=getPhase(dh),pct=entry.goal?Math.min(dh/entry.goal,1):1;
      const bens=getBenefits((entry.metDuration||entry.duration)/3600000),top=bens[bens.length-1];
      html+=`<div class="hist-card fade" style="animation-delay:${i*0.04}s">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
          <div style="display:flex;align-items:center;gap:7px;cursor:pointer;flex:1" onclick="openHistoryModal(${realIdx})">
            <span style="font-size:15px">${top?top.i:'⏱'}</span>
            <span style="font-size:13px;font-weight:700;color:#f5f5f0">${entry.rolling?'∞ ':''}${Math.round(dh*10)/10}h fasta</span>
            ${entry.reachedGoal?`<span style="font-size:9px;padding:2px 6px;border-radius:20px;background:rgba(200,168,78,0.12);color:#c8a84e;border:1px solid rgba(200,168,78,0.22);font-weight:700">✓ MÅL</span>`:''}
            ${(entry.meals||[]).length?`<span style="font-size:9px;padding:2px 6px;border-radius:20px;background:#1a1a1a;color:#8a8a80;border:1px solid #2a2a2a;font-weight:700">🍳 ${entry.meals.length}</span>`:''}
            ${(entry.workouts||[]).length?`<span style="font-size:9px;padding:2px 6px;border-radius:20px;background:rgba(200,168,78,0.08);color:#c8a84e;border:1px solid rgba(200,168,78,0.2);font-weight:700">🏋️ ${entry.workouts.length}</span>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:11px;color:#8a8a80">${fmtD(entry.start)}</span>
            <button onclick="deleteEntry(${realIdx})" style="padding:4px 8px;border-radius:6px;font-size:12px;color:#52525b;background:transparent;border:1px solid #2a2a2a;cursor:pointer" onmouseenter="this.style.color='#ef4444';this.style.borderColor='rgba(239,68,68,0.3)'" onmouseleave="this.style.color='#52525b';this.style.borderColor='#2a2a2a'">✕</button>
          </div>
        </div>
        <div style="height:2px;border-radius:2px;background:#2a2a2a;margin-bottom:7px;overflow:hidden;cursor:pointer" onclick="openHistoryModal(${realIdx})"><div style="height:100%;border-radius:2px;width:${pct*100}%;background:${entry.reachedGoal?'#c8a84e':ph.c}"></div></div>
        <div style="display:flex;justify-content:space-between;cursor:pointer" onclick="openHistoryModal(${realIdx})">
          <div style="font-size:11px;color:#8a8a80">${ph.i} ${ph.l} uppnådd</div>
          <div style="font-size:11px;color:#c8a84e;font-weight:600">Detaljer →</div>
        </div>
      </div>`;
    });
    html+=`<button onclick="if(confirm('Rensa all historik?')){state.history=[];localStorage.removeItem('fh2');renderHistory();}" style="width:100%;margin-top:6px;padding:11px;border-radius:8px;font-size:12px;color:#8a8a80;border:1px solid #2a2a2a;background:transparent;cursor:pointer">Rensa all historik</button>`;
  }
  document.getElementById('content').innerHTML=html;
}

// ── RENDER PROFILE ──
function renderProfile(){
  const pc=profileComplete(),mult=calcMetabolicMultiplier(profile);
  function radio(field,val,label){const sel=profile[field]===val;return`<button class="profile-radio${sel?' selected':''}" onclick="profile['${field}']='${val}';saveProfile();renderProfile()">${label}</button>`;}
  let html=`<div style="font-size:21px;font-weight:800;color:#f5f5f0;margin-bottom:4px;letter-spacing:-.5px">Din profil</div>
    <div style="font-size:13px;color:#8a8a80;margin-bottom:20px">Används för att beräkna din personliga metabola fasttid</div>`;
  if(pc)html+=`<div style="background:rgba(200,168,78,0.08);border:1px solid rgba(200,168,78,0.22);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:#b5b5aa;line-height:1.6">
    <div style="font-weight:700;color:#c8a84e;margin-bottom:4px">✓ Profil klar</div>
    Din personliga multiplikator: <strong style="color:#c8a84e">${mult.toFixed(2)}x</strong> — din kropp ${mult>1?'når fasteeffekterna snabbare':'tar något längre tid att nå fasteeffekterna'} jämfört med referensvärdet.
  </div>`;
  html+=`<div class="card">
    <div class="profile-field"><label class="profile-label">Kön</label><div class="profile-radio-group">${radio('gender','man','Man')}${radio('gender','kvinna','Kvinna')}${radio('gender','annat','Ej specificerat')}</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="profile-field"><label class="profile-label">Ålder (år)</label><input class="profile-input" type="number" min="10" max="110" placeholder="t.ex. 34" value="${profile.age||''}" onchange="profile.age=parseInt(this.value)||null;saveProfile();renderProfile()"/></div>
      <div class="profile-field"><label class="profile-label">Vikt (kg)</label><input class="profile-input" type="number" min="30" max="250" placeholder="t.ex. 78" value="${profile.weight||''}" onchange="profile.weight=parseFloat(this.value)||null;saveProfile();renderProfile()"/></div>
    </div>
    <div class="profile-field"><label class="profile-label">Längd (cm)</label><input class="profile-input" type="number" min="100" max="230" placeholder="t.ex. 178" value="${profile.height||''}" style="max-width:180px" onchange="profile.height=parseFloat(this.value)||null;saveProfile();renderProfile()"/></div>
    <div class="profile-field" style="margin-bottom:0"><label class="profile-label">Aktivitetsnivå</label>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${Object.entries(ACTIVITY_LABELS).map(([val,label])=>{const sel=profile.activity===val;return`<button class="profile-radio${sel?' selected':''}" style="text-align:left;border-radius:10px;padding:10px 14px" onclick="profile.activity='${val}';saveProfile();renderProfile()">${label}</button>`;}).join('')}
      </div>
    </div>
  </div>
  <div class="card"><div class="eyebrow">Hur beräknas den metabola effekten?</div>
    <p style="font-size:13px;color:#b5b5aa;line-height:1.7;margin-bottom:10px">Din personliga metabola fasttid beräknas utifrån hur snabbt din kropp förbrukar sina sockerlager (glykogen) och din grundläggande ämnesomsättning.</p>
    <p style="font-size:12px;color:#8a8a80;line-height:1.7">En atlet med hög ämnesomsättning och delvis tömda lager efter träning når fasteeffekterna snabbare. En stillasittande person med stora fulla lager tar längre tid. Träningspass du loggar under fastan räknas automatiskt in som metabol bonus.</p>
  </div>`;
  document.getElementById('content').innerHTML=html;
}

// ── RENDER ──
function render(){
  renderSidebar();renderMobileStatus();
  if(state.view==='timer')renderTimer();
  else if(state.view==='lära')renderLearn();
  else if(state.view==='historik')renderHistory();
  else if(state.view==='profil')renderProfile();
}
render();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
</body>
</html>
