<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>FASTA — Periodisk fasta timer & tracker | 16:8, OMAD, löpande fasta</title>
<meta name="description" content="Gratis app för periodisk fasta. Starta din 16:8, 18:6, OMAD eller löpande fasta och följ kroppens faser i realtid — fettförbränning, ketos och autofagi. Ingen registrering krävs."/>
<meta name="keywords" content="periodisk fasta, fasta app, 16:8 fasta, intermittent fasting, fasta timer, OMAD, ketos, autofagi, fettförbränning, fasta tracker"/>
<meta name="author" content="fastatimer.se"/>
<link rel="canonical" href="https://fastatimer.se/"/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://fastatimer.se/"/>
<meta property="og:title" content="FASTA — Periodisk fasta timer & tracker"/>
<meta property="og:description" content="Följ din fasta i realtid. Se kroppens faser, fettförbränning, ketos och autofagi. Gratis och utan registrering."/>
<meta property="og:locale" content="sv_SE"/>
<meta name="twitter:card" content="summary"/>
<meta name="twitter:title" content="FASTA — Periodisk fasta timer & tracker"/>
<meta name="twitter:description" content="Gratis app för periodisk fasta. Följ 16:8, OMAD och löpande fasta med realtidstimer och kroppsfaser."/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c8a84e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FASTA"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<div id="app">
  <!-- Desktop sidebar -->
  <div id="sidebar">
    <div class="sidebar-logo"><span>⏱</span><span class="sidebar-logo-text">FASTA</span></div>
    <div id="sidebar-widget"></div>
    <div class="sidebar-divider"></div>
    <button class="nav-btn active"   data-view="timer"    onclick="setView('timer')">  <span class="n-icon">⏱</span><span class="n-label">Timer</span></button>
    <button class="nav-btn inactive" data-view="lära"     onclick="setView('lära')">   <span class="n-icon">📚</span><span class="n-label">Lära</span></button>
    <button class="nav-btn inactive" data-view="historik" onclick="setView('historik')"><span class="n-icon">📋</span><span class="n-label">Historik</span></button>
    <button class="nav-btn inactive" data-view="profil"   onclick="setView('profil')"> <span class="n-icon">👤</span><span class="n-label">Profil</span></button>
  </div>

  <!-- Mobile topbar -->
  <div id="mobile-topbar">
    <span class="topbar-title">FASTA</span>
    <div id="mobile-status-pill">⏱ Ingen fasta</div>
  </div>

  <!-- Main content area -->
  <div id="main"><div id="content"></div></div>

  <!-- Mobile bottom tab bar -->
  <nav id="mobile-tabs">
    <button class="tab-btn active" data-view="timer" onclick="setView('timer')"><span class="tab-icon">⏱</span><span class="tab-label">Timer</span></button>
    <button class="tab-btn" data-view="lära" onclick="setView('lära')"><span class="tab-icon">📚</span><span class="tab-label">Lära</span></button>
    <button class="tab-btn" data-view="historik" onclick="setView('historik')"><span class="tab-icon">📋</span><span class="tab-label">Historik</span></button>
    <button class="tab-btn" data-view="profil" onclick="setView('profil')"><span class="tab-icon">👤</span><span class="tab-label">Profil</span></button>
  </nav>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
